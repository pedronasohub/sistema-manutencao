<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Cadastro de Atividades</title>
  <link rel="stylesheet" href="css/atividadeCadastro.css">
</head>

<body>
  <header>
    <h1>Cadastro de Atividades</h1>
  </header>

  <form id="atividadeForm">
    <div class="cards-container">

      <!-- CARD 0: Cliente e Contrato -->
      <div class="card">
        <h2>Cliente</h2>
        <label>Cliente:</label>
        <select id="cliente" required></select>

        <label>Contrato:</label>
        <select id="contrato" required></select>
      </div>

      <!-- CARD 1: Equipamento -->
      <div class="card">
        <h2 id="equipamentoTitulo">Equipamento</h2>
        <label>Tag:</label>
        <input type="text" id="tag" required>

        <label>Série:</label>
        <input type="text" id="serie" readonly>

        <label>Equipamento:</label>
        <input type="text" id="equipamento" readonly>

        <label>Horímetro:</label>
        <input type="number" id="horimetro" required>
      </div>

      <!-- CARD 2: Informações Gerais -->
      <div class="card">
        <h2>Geral</h2>
        <label>Tipo:</label>
        <select id="tipo" required>
          <option value="preventiva">Preventiva</option>
          <option value="corretiva">Corretiva</option>
          <option value="backlog">Backlog</option>
        </select>

        <label>Atividade Requisitada:</label>
        <input type="text" id="atividade_requisitada" required>

        <label>OM:</label>
        <input type="text" id="om" required>

        <label>Observação:</label>
        <textarea id="observacao"></textarea>
      </div>

      <!-- CARD 3: Detalhes da Atividade -->
      <div class="card">
        <h2>Detalhes</h2>
        <label>Turno:</label>
        <select id="turno" required>
          <option value="A">A</option>
          <option value="C">C</option>
        </select>

        <label>Duração (HH):</label>
        <input type="number" id="duracao" required>

        <label>Job:</label>
        <input type="text" id="job">

        <label>Component:</label>
        <input type="text" id="comp">

        <label>Data Início:</label>
        <input type="date" id="data_inicio" required>

        <label>Data Término:</label>
        <input type="date" id="data_termino" required>

        <label>Valor Hora:</label>
        <input type="number" value="177.49" readonly>
      </div>

      <!-- CARD 4: Equipe Técnica -->
      <div class="card">
        <h2>Equipe Técnica</h2>

        <label>Pesquisar Técnico:</label>
        <input type="text" id="searchTecnico" placeholder="Nome ou Matrícula">

        <table id="tecnicosTable">
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAllTecnicos"></th>
              <th>Matrícula</th>
              <th>Nome</th>
              <th>Supervisor</th>
              <th>Turno</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </div>

    <button type="submit">Salvar Atividade</button>
  </form>

  <hr>

  <h2>Lista de Atividades</h2>
  <table id="atividadesTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Contrato</th>
        <th>Tag</th>
        <th>Equipamento</th>
        <th>Tipo</th>
        <th>Turno</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="js/atividadeCadastro.js"></script>
</body>

</html>
