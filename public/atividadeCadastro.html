<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Atividade</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f6fa;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    .field textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .tecnicos-box {
      margin-top: 20px;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      background: #fafafa;
    }

    .tecnicos-header {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .tecnicos-header select,
    .tecnicos-header button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .tecnicos-header button {
      background: #1f6feb;
      color: white;
      border: none;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f0f2f5;
    }

    .btn-remove {
      background: #d93025;
      color: white;
      border: none;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }

    .btn-primary {
      background: #198754;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .msg {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .msg.success {
      background: #d1e7dd;
      color: #0f5132;
    }

    .msg.error {
      background: #f8d7da;
      color: #842029;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cadastro de Atividade</h1>

    <div class="grid">
      <div class="field">
        <label for="tag">Tag do Equipamento</label>
        <input type="text" id="tag" placeholder="Ex: EM30009" />
      </div>

      <div class="field">
        <label for="om">OM</label>
        <input type="text" id="om" placeholder="Ex: 12345678" />
      </div>

      <div class="field full">
        <label for="atividade">Atividade</label>
        <input type="text" id="atividade" placeholder="Ex: PREVENTIVA DE 250 HORAS" />
      </div>

      <div class="field">
        <label for="turno">Turno</label>
        <select id="turno">
          <option value="">Selecione</option>
          <option value="A">Turno A</option>
          <option value="B">Turno B</option>
          <option value="C">Turno C</option>
          <option value="ADM">ADM</option>
        </select>
      </div>

      <div class="field">
        <label for="status">Status</label>
        <select id="status">
          <option value="PENDENTE">PENDENTE</option>
          <option value="EM EXECUCAO">EM EXECUÇÃO</option>
          <option value="CONCLUIDO">CONCLUÍDO</option>
        </select>
      </div>

      <div class="field full">
        <label for="observacao">Observação</label>
        <textarea id="observacao" rows="3" placeholder="Observações da atividade"></textarea>
      </div>
    </div>

    <div class="tecnicos-box">
      <h3>Técnicos da Atividade</h3>

      <div class="tecnicos-header">
        <select id="selectTecnico">
          <option value="">Selecione um técnico</option>
        </select>
        <button type="button" id="btnAdicionarTecnico">Adicionar Técnico</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Técnico</th>
            <th>HH</th>
            <th>Líder</th>
            <th>Status</th>
            <th>Observação</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="tbodyTecnicos">
          <tr>
            <td colspan="6" style="text-align:center;">Nenhum técnico adicionado.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="actions">
      <button class="btn-primary" id="btnSalvarAtividade">Salvar Atividade</button>
      <button class="btn-secondary" id="btnLimpar">Limpar</button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <script src="/js/atividadeCadastro.js"></script>
</body>
</html>
