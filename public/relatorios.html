<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relatórios</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Sistema de Manutenção</h1>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="nova-atividade.html">Nova atividade</a>
      <a href="atividades.html">Atividades</a>
      <a href="configuracoes.html">Configurações</a>
      <a href="tecnicos.html">Técnicos</a>
      <a href="equipamentos.html">Equipamentos</a>
    </nav>
  </header>

  <div class="container">
    <h2>Relatórios</h2>

    <div class="grid grid-3">
      <input type="date" id="dataInicio">
      <input type="date" id="dataFim">
      <input type="text" id="responsavel" placeholder="Responsável">
    </div>

    <br>
    <button onclick="gerarRelatorio()">Gerar Relatório</button>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Responsável</th>
          <th>Início</th>
          <th>Término</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tbodyRelatorios"></tbody>
    </table>
  </div>

  <script src="js/common.js"></script>
  <script src="js/relatorios.js"></script>
</body>
</html>
