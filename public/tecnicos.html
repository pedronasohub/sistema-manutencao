<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Técnicos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Sistema de Manutenção</h1>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="nova-atividade.html">Nova atividade</a>
      <a href="atividades.html">Atividades</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="configuracoes.html">Configurações</a>
      <a href="equipamentos.html">Equipamentos</a>
    </nav>
  </header>

  <div class="container">
    <h2>Cadastro de Técnicos</h2>

    <form id="formTecnico" class="grid grid-2">
      <input type="text" id="matricula" placeholder="Matrícula" required>
      <input type="text" id="nome" placeholder="Nome" required>
      <button type="submit">Salvar Técnico</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Matrícula</th>
          <th>Nome</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbodyTecnicos"></tbody>
    </table>
  </div>

  <script src="js/common.js"></script>
  <script src="js/tecnicos.js"></script>
</body>
</html>
